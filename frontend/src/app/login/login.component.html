<div class="login-container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4 login-card">

    <h3 class="text-center mb-4">
      <img src="../../assets/e27bbbd3-fe74-43dd-8707-17f62674af2d.jpg" class="img-fluid w-50 h-25" alt="">
    </h3>

    <form [formGroup]="loginForm" (ngSubmit)="login()">

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input 
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter email"
        />
        <div class="text-danger small" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Enter valid email
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input 
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter password"
        />
        <div class="text-danger small" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Minimum 6 characters required
        </div>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <!-- Button -->
      <button 
        type="submit" 
        class="btn btn-primary w-100"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

    </form>
  </div>
</div>
